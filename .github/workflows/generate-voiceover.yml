name: Complete Video Production Pipeline

on:
  workflow_dispatch:
    inputs:
      news_data:
        description: 'JSON array of news items with timestamps'
        required: true
        type: string
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  complete-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Anchor Video Keyframes (One-time optimization)
        run: |
          echo "🔧 Fixing anchor.mp4 keyframe spacing..."
          python scripts/fix_anchor_keyframes.py || echo "Anchor already fixed or not needed"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
          # Install complete espeak-ng with ALL language data (including Hindi phonemes)
          sudo apt-get install -y espeak-ng espeak-ng-data libespeak-ng1 libespeak-ng-dev
          
          # Update library cache to ensure proper linking
          sudo ldconfig
          
          # Verify espeak-ng installation and Hindi language support
          espeak-ng --version || echo "Warning: espeak-ng not found"
          espeak-ng --voices=hi || echo "Warning: Hindi voices not found"
          
          # Install comprehensive font packages for Hindi/Devanagari
          sudo apt-get install -y \
            fonts-noto-core \
            fonts-noto-ui-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            fonts-lohit-deva \
            fonts-indic
          
          # Rebuild font cache
          sudo fc-cache -f -v
          
          # Verify Hindi fonts are available
          echo "📝 Checking installed fonts..."
          fc-list :lang=hi | head -20 || echo "Warning: No Hindi fonts found"
          
          # List Noto fonts specifically
          fc-list | grep -i noto | grep -i sans | head -10 || echo "Noto Sans fonts check"
          
      - name: Install yt-dlp
        run: |
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Piper TTS
        run: |
          echo "📥 Installing Piper TTS..."
          wget -O piper.tar.gz https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar -xzf piper.tar.gz
          
          # Copy Piper shared libraries to system path (fixes libpiper_phonemize.so.1 error)
          echo "📚 Installing Piper shared libraries..."
          sudo cp piper/lib*.so* /usr/local/lib/ 2>/dev/null || echo "No additional libs to copy"
          sudo cp piper/*.so* /usr/local/lib/ 2>/dev/null || echo "No root libs to copy"
          sudo ldconfig
          
          # Move piper binary to system path
          sudo mv piper/piper /usr/local/bin/
          piper --version
          
          echo "📥 Downloading Hindi Male voice model (compatible with Piper 1.2.0)..."
          mkdir -p ~/.local/share/piper/voices
          
          # Using older compatible model from official Hugging Face (IR version 8)
          # This is the original piper-voices repository with compatible models
          wget -O ~/.local/share/piper/voices/hi_IN-pratham-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx
          wget -O ~/.local/share/piper/voices/hi_IN-pratham-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx.json
          
          # Verify files downloaded
          ls -lh ~/.local/share/piper/voices/
          echo "✅ Hindi male voice model (pratham-medium) installed"

      - name: Install Python dependencies
        run: |
          pip install boto3 requests apify-client firebase-admin

      - name: Step 1 - Download and Process Video Clips
        env:
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          NEWS_DATA: ${{ inputs.news_data }}
          APIFY_TOKEN_1: ${{ secrets.APIFY_TOKEN_1 }}
          APIFY_TOKEN_2: ${{ secrets.APIFY_TOKEN_2 }}
          APIFY_TOKEN_3: ${{ secrets.APIFY_TOKEN_3 }}
          APIFY_TOKEN_4: ${{ secrets.APIFY_TOKEN_4 }}
          APIFY_TOKEN_5: ${{ secrets.APIFY_TOKEN_5 }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎬 Starting video processing with Apify (5-token rotation)..."
          python scripts/process_videos.py

      - name: Step 2 - Generate Voiceovers with Piper TTS (Hindi Male - Best Quality)
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎙️ Generating voiceovers with Piper TTS (1x speed)..."
          python scripts/generate_voiceovers.py

      - name: Step 3 - Create Vertical Reels (9:16 Format)
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎨 Creating vertical Instagram Reels..."
          python scripts/create_vertical_reels.py

      - name: Step 4 - Save to Firebase Firestore
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        run: |
          echo "💾 Saving reels metadata to Firestore..."
          python scripts/save_to_firestore.py

      - name: Step 5 - Cleanup Old Reels (Auto-Delete Previous Batch)
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        run: |
          echo "🧹 Cleaning up old reels from previous workflow..."
          python scripts/cleanup_old_reels.py

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-results
          path: |
            video_results.json
            results.json
            reel_results.json
            firestore_save_summary.json
          retention-days: 7

      - name: Display Final Results
        run: |
          echo "🎊 ========================================="
          echo "   VERTICAL REEL PRODUCTION FINISHED!"
          echo "========================================="
          cat reel_results.json
