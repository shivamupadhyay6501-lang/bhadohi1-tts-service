name: Generate Hindi Voiceovers with Piper

on:
  workflow_dispatch:
    inputs:
      news_data:
        description: 'JSON array of news items'
        required: true
        type: string

jobs:
  generate-voiceovers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Piper Binary and Model
        id: cache-piper
        uses: actions/cache@v3
        with:
          path: |
            piper
            hi_IN-pratham-medium.onnx
            hi_IN-pratham-medium.onnx.json
          key: piper-hindi-pratham-v1

      - name: Download Piper TTS (if not cached)
        if: steps.cache-piper.outputs.cache-hit != 'true'
        run: |
          echo "📥 Downloading Piper TTS..."
          wget https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_amd64.tar.gz
          tar -xzf piper_amd64.tar.gz
          chmod +x piper/piper
          
          echo "📥 Downloading Hindi voice model (Pratham - male voice)..."
          wget "https://huggingface.co/rhasspy/piper-voices/resolve/main/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx"
          wget "https://huggingface.co/rhasspy/piper-voices/resolve/main/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx.json"

      - name: Install dependencies
        run: |
          pip install boto3

      - name: Generate Voiceovers
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python scripts/generate_voiceovers.py

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: voiceover-results
          path: results.json
          retention-days: 7

      - name: Post Results as Comment
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "✅ Voiceover generation complete!"
          cat results.json
