name: Complete Video Production Pipeline

on:
  workflow_dispatch:
    inputs:
      news_data:
        description: 'JSON array of news items with timestamps'
        required: true
        type: string
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  complete-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Install yt-dlp
        run: |
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Cache Piper Binary and Model
        id: cache-piper
        uses: actions/cache@v3
        with:
          path: |
            piper
            hi_IN-pratham-medium.onnx
            hi_IN-pratham-medium.onnx.json
          key: piper-hindi-pratham-v1

      - name: Download Piper TTS (if not cached)
        if: steps.cache-piper.outputs.cache-hit != 'true'
        run: |
          echo "📥 Downloading Piper TTS..."
          wget https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_amd64.tar.gz
          tar -xzf piper_amd64.tar.gz
          chmod +x piper/piper
          
          echo "📥 Downloading Hindi voice model (Pratham - male voice)..."
          wget "https://huggingface.co/rhasspy/piper-voices/resolve/main/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx"
          wget "https://huggingface.co/rhasspy/piper-voices/resolve/main/hi/hi_IN/pratham/medium/hi_IN-pratham-medium.onnx.json"

      - name: Install Python dependencies
        run: |
          pip install boto3 requests apify-client

      - name: Step 1 - Download and Process Video Clips
        env:
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          NEWS_DATA: ${{ inputs.news_data }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎬 Starting video processing with Apify..."
          python scripts/process_videos.py

      - name: Step 2 - Generate Voiceovers and Captions
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎙️ Generating voiceovers..."
          python scripts/generate_voiceovers.py

      - name: Step 3 - Create Vertical Reels (9:16 Format)
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎨 Creating vertical Instagram Reels..."
          python scripts/create_vertical_reels.py

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-results
          path: |
            video_results.json
            results.json
            reel_results.json
          retention-days: 7

      - name: Display Final Results
        run: |
          echo "🎊 ========================================="
          echo "   VERTICAL REEL PRODUCTION FINISHED!"
          echo "========================================="
          cat reel_results.json
