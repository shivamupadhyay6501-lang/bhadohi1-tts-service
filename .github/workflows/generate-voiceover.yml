name: Complete Video Production Pipeline

on:
  workflow_dispatch:
    inputs:
      news_data:
        description: 'JSON array of news items with timestamps'
        required: true
        type: string
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  complete-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Anchor Video Keyframes (One-time optimization)
        run: |
          echo "🔧 Fixing anchor.mp4 keyframe spacing..."
          python scripts/fix_anchor_keyframes.py || echo "Anchor already fixed or not needed"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
          # Install comprehensive font packages for Hindi/Devanagari
          sudo apt-get install -y \
            fonts-noto-core \
            fonts-noto-ui-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            fonts-lohit-deva \
            fonts-indic
          
          # Rebuild font cache
          sudo fc-cache -f -v
          
          # Verify Hindi fonts are available
          echo "📝 Checking installed fonts..."
          fc-list :lang=hi | head -20 || echo "Warning: No Hindi fonts found"
          
          # List Noto fonts specifically
          fc-list | grep -i noto | grep -i sans | head -10 || echo "Noto Sans fonts check"
          
      - name: Install yt-dlp
        run: |
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Cache Kokoro Binary and Model
        id: cache-kokoro
        uses: actions/cache@v3
        with:
          path: |
            kokoro
            voices
          key: kokoro-hindi-psi-v1

      - name: Download Kokoro TTS (if not cached)
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          echo "📥 Downloading Kokoro TTS..."
          wget https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-v0.1.0/kokoro-v0.1.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf kokoro-v0.1.0-x86_64-unknown-linux-gnu.tar.gz
          chmod +x kokoro
          
          echo "📥 Downloading Hindi Psi voice model..."
          mkdir -p voices
          wget -O voices/hm_psi.onnx "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-v0.1.0/kokoro-v0.19_hm_psi.onnx"

      - name: Install Python dependencies
        run: |
          pip install boto3 requests apify-client

      - name: Step 1 - Download and Process Video Clips
        env:
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          NEWS_DATA: ${{ inputs.news_data }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎬 Starting video processing with Apify..."
          python scripts/process_videos.py

      - name: Step 2 - Generate Voiceovers and Captions
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎙️ Generating voiceovers..."
          python scripts/generate_voiceovers.py

      - name: Step 3 - Create Vertical Reels (9:16 Format)
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          echo "🎨 Creating vertical Instagram Reels..."
          python scripts/create_vertical_reels.py

      - name: Install Firebase Admin SDK
        run: |
          pip install firebase-admin

      - name: Step 4 - Save to Firebase Firestore
        env:
          NEWS_DATA: ${{ inputs.news_data }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        run: |
          echo "💾 Saving reels metadata to Firestore..."
          python scripts/save_to_firestore.py

      - name: Step 5 - Cleanup Old Reels (Auto-Delete Previous Batch)
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        run: |
          echo "🧹 Cleaning up old reels from previous workflow..."
          python scripts/cleanup_old_reels.py

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-results
          path: |
            video_results.json
            results.json
            reel_results.json
            firestore_save_summary.json
          retention-days: 7

      - name: Display Final Results
        run: |
          echo "🎊 ========================================="
          echo "   VERTICAL REEL PRODUCTION FINISHED!"
          echo "========================================="
          cat reel_results.json
